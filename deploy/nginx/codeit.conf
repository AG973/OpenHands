# CODEIT Nginx reverse proxy configuration
# Install: sudo cp codeit.conf /etc/nginx/sites-available/codeit
#          sudo ln -sf /etc/nginx/sites-available/codeit /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

upstream codeit_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream codeit_frontend {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name _;  # Replace with your domain or IP

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size (matches backend 50MB limit)
    client_max_body_size 50m;

    # Backend API
    location /api/ {
        proxy_pass http://codeit_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # WebSocket (Socket.IO)
    location /socket.io/ {
        proxy_pass http://codeit_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;  # Keep WebSocket alive for 24h
        proxy_send_timeout 86400s;
    }

    # MCP endpoint
    location /mcp {
        proxy_pass http://codeit_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Frontend (SPA — all non-API routes serve index.html)
    location / {
        proxy_pass http://codeit_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # SPA fallback — if frontend server is down, try serving static files directly
        error_page 502 503 504 =200 /index.html;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://codeit_frontend;
        proxy_http_version 1.1;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint (no auth required)
    location = /api/codeit/health {
        proxy_pass http://codeit_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}
