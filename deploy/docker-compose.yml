version: "3.8"
# CODEIT Production Docker Compose
# Usage: docker compose -f deploy/docker-compose.yml up -d

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    ports:
      - "3000:3000"
    volumes:
      - codeit-data:/root/.codeit
      - workspace:/root/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SERVE_FRONTEND=false
      - WORKSPACE_BASE=/root/workspace
      - CODEIT_DATA_DIR=/root/.codeit
      - LLM_NATIVE_TOOL_CALLING=false
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/codeit/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ../codeit-ui
      dockerfile: ../deploy/Dockerfile.frontend
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/codeit.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  codeit-data:
  workspace:
